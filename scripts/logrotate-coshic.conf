# Coshic NAS logrotate rules.
# Loaded INSTEAD of /etc/logrotate.conf - we don't want the Debian default
# pulling in /var/log/wtmp/btmp etc. inside the container.
#
# Runs daily via /usr/local/bin/run-logrotate.sh (a supervisord program).

# Defaults
weekly
rotate 4
size 10M
missingok
notifempty
nocreate
compress
delaycompress
copytruncate

# Apache (WebDAV) -------------------------------------------------------------
/var/log/apache2/*.log {
    daily
    rotate 7
    size 20M
    missingok
    notifempty
    compress
    delaycompress
    copytruncate
    sharedscripts
    postrotate
        /usr/sbin/apache2ctl graceful 2>/dev/null || true
    endscript
}

# Samba -----------------------------------------------------------------------
/var/log/samba/log.* {
    daily
    rotate 7
    size 20M
    missingok
    notifempty
    compress
    delaycompress
    copytruncate
}

# Supervisor's own log --------------------------------------------------------
/var/log/supervisor/supervisord.log {
    weekly
    rotate 4
    size 10M
    missingok
    notifempty
    compress
    delaycompress
    copytruncate
}

# Per-program supervisor stdout captures --------------------------------------
# (supervisord also enforces stdout_logfile_maxbytes/backups; this is a backstop.)
/var/log/supervisor/*.log {
    weekly
    rotate 3
    size 20M
    missingok
    notifempty
    compress
    delaycompress
    copytruncate
}

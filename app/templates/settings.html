{% extends 'base.html' %}
{% block title %} - Settings{% endblock %}
{% block page_title %}Settings{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5 col-md-7">

    <div class="card">
      <div class="card-header">
        <i class="bi bi-key-fill me-2 text-primary"></i>Change Admin Password
      </div>
      <div class="card-body">
        <form method="post" autocomplete="off">
          <div class="mb-3">
            <label class="form-label fw-semibold">Current Password</label>
            <input type="password" name="current_password" class="form-control"
                   autocomplete="current-password" required placeholder="••••••••">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">New Password</label>
            <input type="password" name="new_password" class="form-control"
                   autocomplete="new-password" required placeholder="••••••••"
                   minlength="4">
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Confirm New Password</label>
            <input type="password" name="confirm_password" class="form-control"
                   autocomplete="new-password" required placeholder="••••••••">
          </div>
          <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-check-lg me-2"></i>Change Password
          </button>
        </form>
      </div>
      <div class="card-footer text-muted small">
        The password is stored in the <code>nas_config</code> Docker volume and
        persists across container restarts.
      </div>
    </div>

  </div>
</div>
{% endblock %}

DavLockDB /tmp/DavLock

# Hide Apache version from Server header / error pages
ServerTokens Prod
ServerSignature Off

<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/html

    Include /data/config/apache-shares.conf
    ErrorLog /var/log/apache2/webdav-error.log
    CustomLog /var/log/apache2/webdav-access.log combined
</VirtualHost>

<VirtualHost *:443>
    ServerName localhost
    DocumentRoot /var/www/html

    SSLEngine on
    SSLCertificateFile /data/config/ssl/server.crt
    SSLCertificateKeyFile /data/config/ssl/server.key

    # Disable old TLS versions and weak ciphers
    SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1
    SSLHonorCipherOrder on
    SSLCipherSuite ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384

    # HSTS - only sent over HTTPS, instructs browsers to never use plain HTTP
    Header always set Strict-Transport-Security "max-age=31536000"

    Include /data/config/apache-shares.conf
    ErrorLog /var/log/apache2/webdav-ssl-error.log
    CustomLog /var/log/apache2/webdav-ssl-access.log combined
</VirtualHost>

[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
logfile_maxbytes=10MB
logfile_backups=4
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor

# Per-program log caps (stdout_logfile_maxbytes / _backups) bound the worst-case
# log volume to ~10MB * 4 backups per program. External log files (samba's own
# log.*, apache's access/error.log) are rotated separately by run-logrotate.sh.

[program:avahi]
command=/usr/sbin/avahi-daemon --no-dbus -f /etc/avahi/avahi-daemon.conf
autostart=true
autorestart=true
priority=5
stopasgroup=true
killasgroup=true
stopwaitsecs=5
stdout_logfile=/var/log/supervisor/avahi.log
stderr_logfile=/var/log/supervisor/avahi.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=3
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=3

[program:samba-smbd]
command=/usr/sbin/smbd --foreground --no-process-group
autostart=true
autorestart=true
priority=10
stopasgroup=true
killasgroup=true
stopwaitsecs=10
stdout_logfile=/var/log/supervisor/smbd.log
stderr_logfile=/var/log/supervisor/smbd.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=3
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=3

[program:samba-nmbd]
command=/usr/sbin/nmbd --foreground --no-process-group
autostart=true
autorestart=true
priority=10
stopasgroup=true
killasgroup=true
stopwaitsecs=10
stdout_logfile=/var/log/supervisor/nmbd.log
stderr_logfile=/var/log/supervisor/nmbd.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=3
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=3

[program:nfs]
command=/usr/local/bin/run-nfs.sh
autostart=true
autorestart=true
priority=5
stopasgroup=true
killasgroup=true
stopwaitsecs=15
stdout_logfile=/var/log/supervisor/nfs.log
stderr_logfile=/var/log/supervisor/nfs.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=3
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=3

[program:vsftpd]
command=/usr/sbin/vsftpd /etc/vsftpd.conf
autostart=true
autorestart=true
priority=10
stopasgroup=true
killasgroup=true
stopwaitsecs=5
stdout_logfile=/var/log/supervisor/vsftpd.log
stderr_logfile=/var/log/supervisor/vsftpd.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=3
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=3

[program:sshd]
command=/usr/sbin/sshd -D
autostart=true
autorestart=true
priority=10
stopasgroup=true
killasgroup=true
stopwaitsecs=5
stdout_logfile=/var/log/supervisor/sshd.log
stderr_logfile=/var/log/supervisor/sshd.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=3
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=3

[program:apache2]
command=/usr/sbin/apache2 -DFOREGROUND
autostart=true
autorestart=true
priority=10
stopasgroup=true
killasgroup=true
stopwaitsecs=10
environment=APACHE_RUN_USER=www-data,APACHE_RUN_GROUP=www-data,APACHE_RUN_DIR=/var/run/apache2,APACHE_LOG_DIR=/var/log/apache2,APACHE_PID_FILE=/var/run/apache2/apache2.pid
stdout_logfile=/var/log/supervisor/apache2.log
stderr_logfile=/var/log/supervisor/apache2.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=3
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=3

[program:init-states]
command=/usr/local/bin/apply-services.sh
autostart=true
autorestart=false
startsecs=0
startretries=0
priority=98
stdout_logfile=/var/log/supervisor/init-states.log
stderr_logfile=/var/log/supervisor/init-states.log
stdout_logfile_maxbytes=2MB
stdout_logfile_backups=2
stderr_logfile_maxbytes=2MB
stderr_logfile_backups=2

[program:logrotate]
command=/usr/local/bin/run-logrotate.sh
autostart=true
autorestart=true
priority=99
stdout_logfile=/var/log/supervisor/logrotate.log
stderr_logfile=/var/log/supervisor/logrotate.log
stdout_logfile_maxbytes=2MB
stdout_logfile_backups=2
stderr_logfile_maxbytes=2MB
stderr_logfile_backups=2

[program:webapp]
command=/app/venv/bin/gunicorn --bind 0.0.0.0:8080 --workers 2 --timeout 60 app:app
directory=/app
autostart=true
autorestart=true
priority=20
stopasgroup=true
killasgroup=true
stopwaitsecs=10
environment=CONFIG_DIR=/data/config
stdout_logfile=/var/log/supervisor/webapp.log
stderr_logfile=/var/log/supervisor/webapp.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=3
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=3
